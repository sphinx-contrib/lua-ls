version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev:
        patterns:
          - "beautifulsoup4"
          - "furo"
          - "myst-parser"
          - "PyGithub"
          - "pyright"
          - "pytest-cov"
          - "pytest-regressions"
          - "pytest"
          - "requests"
          - "sphinx_design"
          - "sphinx-autobuild"
          - "sphinx"
          - "sybil"
          - "tox"
          - "tox-uv"
      style:
        patterns:
          - "prek"
          - "ruff"
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      pre-commit:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gh-actions:
        patterns:
          - "*"
